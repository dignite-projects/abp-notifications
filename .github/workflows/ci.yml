name: CI

# `build-and-test` is a required status check on main (with enforce_admins), so the pull_request
# trigger must not filter by path: a docs-only PR would never start this workflow, the check would
# never report, and the PR could never be merged by anyone. The push trigger is informational and
# keeps its filter.
on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '.claude/**'
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm
          cache-dependency-path: angular/package-lock.json

      - name: Verify NuGet and npm version lockstep
        id: version
        shell: pwsh
        run: |
          $version = & ./.github/scripts/verify-version-lockstep.ps1
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore Dignite.Abp.Notifications.slnx

      - name: Build
        run: dotnet build Dignite.Abp.Notifications.slnx --no-restore --configuration Release

      # Dignite.Abp.NotificationCenter.TestBase is IsTestProject=false (shared scenarios, no
      # runner) - it is exercised indirectly via the two projects below, never run directly.
      - name: Run Notifications (core) tests
        run: dotnet test core/test/Dignite.Abp.Notifications.Tests/Dignite.Abp.Notifications.Tests.csproj --no-build --configuration Release --verbosity normal

      # EF Core provider - runs against in-memory Sqlite, no external database dependency.
      - name: Run NotificationCenter (EF Core) tests
        run: dotnet test notification-center/test/Dignite.Abp.NotificationCenter.Tests/Dignite.Abp.NotificationCenter.Tests.csproj --no-build --configuration Release --verbosity normal

      # MongoDB provider - starts an embedded mongod via MongoSandbox (MongoSandbox8.runtime.linux-x64
      # is pinned in Directory.Packages.props and resolves fine on this runner); no external
      # MongoDB install needed.
      - name: Run NotificationCenter (MongoDB) tests
        run: dotnet test notification-center/test/Dignite.Abp.NotificationCenter.MongoDB.Tests/Dignite.Abp.NotificationCenter.MongoDB.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Pack NuGet packages
        run: dotnet pack Dignite.Abp.Notifications.slnx --no-build --configuration Release --output ./artifacts-ci/nuget

      - name: Smoke-test packed NuGet packages
        shell: pwsh
        run: ./.github/scripts/smoke-test-nuget-packages.ps1 ./artifacts-ci/nuget '${{ steps.version.outputs.version }}'

      - name: Install Angular dependencies
        working-directory: angular
        run: npm ci

      - name: Build Angular library
        working-directory: angular
        run: npm run build:lib

      - name: Build Angular demo
        working-directory: angular
        run: npm run build:prod

      - name: Pack Angular library
        shell: pwsh
        working-directory: angular
        run: |
          New-Item -ItemType Directory -Force ../artifacts-ci/npm | Out-Null
          npm pack ./dist/notification-center --pack-destination ../artifacts-ci/npm
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Smoke-test packed Angular library
        shell: pwsh
        run: |
          $tarballs = @(Get-ChildItem ./artifacts-ci/npm/*.tgz)
          if ($tarballs.Count -ne 1) {
            throw "Expected one Angular package tarball, found $($tarballs.Count)."
          }
          node ./.github/scripts/smoke-test-angular-package.mjs $tarballs[0].FullName '${{ steps.version.outputs.version }}'

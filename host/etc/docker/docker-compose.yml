services:
  host-web:
    image: dignite.notificationcenter.web/host-web:latest
    container_name: notificationcenter-host-web
    build:
      context: ../../../
      dockerfile: angular/Dockerfile.local
    ports:
      - "4200:80"
    depends_on:
      - host-api
    volumes:
      - ./dynamic-env.json://usr/share/nginx/html/dynamic-env.json
    networks:
      - abp-network

  host-api:
    image: dignite.notificationcenter.web/host-api:latest
    container_name: notificationcenter-host-api-container
    build:
      context: ../../
      dockerfile: Dignite.NotificationCenter.Web.Host/Dockerfile.local
    environment:
      - ASPNETCORE_URLS=https://+:8081;http://+:8080;
      - Kestrel__Certificates__Default__Path=/app/certs/localhost.pfx
      - Kestrel__Certificates__Default__Password=ee3ba876-4a3e-4ed4-a649-b695dbc5d160
      - App__SelfUrl=https://localhost:44380
      - App__HealthCheckUrl=http://host:8080/health-status
      - AuthServer__Authority=http://host-api:8080
      - AuthServer__RequireHttpsMetadata=false
      - AuthServer__SetSelfAsIssuer=true
      - ConnectionStrings__Default=DataSource=/data/Host.db
    ports:
      - "44380:8081"
    depends_on:
      sqlite:
        condition: service_healthy
    restart: on-failure
    volumes:
      - sqlite_data:/data
      - ./certs:/app/certs
    networks:
      - abp-network

  db-migrator:
    image: dignite.notificationcenter.web/host-api:latest
    container_name: notificationcenter-db-migrator
    build:
      context: ../../
      dockerfile: Dignite.NotificationCenter.Web.Host/Dockerfile.local
    environment:
      - ConnectionStrings__Default=DataSource=/data/Host.db
    command:
      - --migrate-database
    depends_on:
      sqlite:
        condition: service_healthy
    volumes:
      - sqlite_data:/data
    networks:
      - abp-network
  sqlite:
    container_name: notificationcenter-sqlite-container
    image: alpine:latest
    command: sh -c "apk add sqlite && touch /data/Host.db && sqlite3 /data/Host.db '.databases' && tail -f /dev/null"
    environment:
      - TZ=UTC
    volumes:
      - sqlite_data:/data
    networks:
      - abp-network
    healthcheck:
      test: ["CMD-SHELL", "if [ -f /data/Host.db ]; then exit 0; else exit 1; fi"]
      interval: 10s
      timeout: 3s
      retries: 10
volumes:
  sqlite_data:
    name: notificationcenter_host_sqlite_data
networks:
  abp-network:
    name: notificationcenter-host-network
    driver: bridge
